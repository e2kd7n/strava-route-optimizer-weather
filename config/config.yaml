strava:
  client_id: ${STRAVA_CLIENT_ID}
  client_secret: ${STRAVA_CLIENT_SECRET}

data_fetching:
  cache_enabled: true
  cache_duration_days: 365  # Extended to 1 year - historical data doesn't change
  max_activities: 500

location_detection:
  clustering:
    eps: 0.002  # ~200 meters
    min_samples: 5
  time_windows:
    morning_start: "06:00"
    morning_end: "10:00"
    evening_start: "16:00"
    evening_end: "20:00"

route_filtering:
  min_distance_km: 2
  max_distance_km: 30
  activity_types:
    - Ride
    - EBikeRide
  exclude_virtual: true

route_analysis:
  similarity_threshold: 0.70  # Fréchet distance threshold for route grouping (0.70 = routes follow similar paths)
  min_route_frequency: 2
  enable_geocoding: true  # ENABLED - IP is not blocked, rate limiting set to 1 req/sec
  outlier_tolerance_percentile: 95.0  # Ignore worst 5% of point deviations in Hausdorff calculation
  # Similarity algorithm: Uses Fréchet distance (primary) with Hausdorff validation (secondary)
  # Fréchet is superior for route comparison as it considers path order and is more robust to GPS sampling
  # Percentile-based Hausdorff tolerates GPS glitches and brief detours while catching real route differences

route_naming:
  sampling_density: 10  # Number of points to sample along route for naming
  min_segment_length_pct: 10  # Minimum % to be considered significant segment
  show_full_path: true  # Show start → middle → end format
  max_segments_in_name: 3  # Maximum segments to include in name
  enable_segment_naming: true  # Feature flag to enable/disable segment-based naming

optimization:
  weights:
    time: 0.35      # Speed and duration
    distance: 0.25  # Route length
    safety: 0.25    # Familiarity and road conditions
    weather: 0.15   # Wind impact on cycling efficiency
  weather_enabled: true  # Enable real-time weather analysis

visualization:
  map:
    zoom_level: 13
    tile_layer: "CartoDB Positron"
  colors:
    optimal: "#28a745"  # Green - semantic color for optimal/success
    alternative: ["#dc3545", "#007bff", "#ffc107", "#6f42c1"]  # Red, Blue, Yellow, Purple
  route_weight:
    optimal: 5
    alternative: 3

long_rides:
  enabled: true
  min_distance_km: 15  # Minimum distance to be considered a long ride
  search_radius_km: 5  # Radius to search for rides near clicked location
  default_target_duration_hours: 2.0  # Default target ride duration
  default_target_distance_km: 40  # Default target ride distance

output:
  report_directory: "output/reports"
  map_filename: "route_map.html"
  report_filename: "commute_analysis.html"

units:
  system: "imperial"  # Options: "metric" or "imperial"
  # metric: km, km/h, m/s (wind), °C
  # imperial: mi, mph, mph (wind), °F

