strava:
  client_id: ${STRAVA_CLIENT_ID}
  client_secret: ${STRAVA_CLIENT_SECRET}

data_fetching:
  cache_enabled: true
  cache_duration_days: 7
  max_activities: 500

location_detection:
  clustering:
    eps: 0.002  # ~200 meters
    min_samples: 5
  time_windows:
    morning_start: "06:00"
    morning_end: "10:00"
    evening_start: "16:00"
    evening_end: "20:00"

route_filtering:
  min_distance_km: 2
  max_distance_km: 30
  activity_types:
    - Ride
    - EBikeRide
  exclude_virtual: true

route_analysis:
  similarity_threshold: 0.75  # Lower = more aggressive deduplication (routes must be more different to be separate)
  min_route_frequency: 2

optimization:
  weights:
    time: 0.35      # Speed and duration
    distance: 0.25  # Route length
    safety: 0.25    # Familiarity and road conditions
    weather: 0.15   # Wind impact on cycling efficiency
  weather_enabled: true  # Enable real-time weather analysis

visualization:
  map:
    zoom_level: 13
    tile_layer: "OpenStreetMap"
  colors:
    optimal: "#FF0000"
    alternative: ["#00FF00", "#0000FF", "#FFA500", "#800080"]
  route_weight:
    optimal: 5
    alternative: 3

long_rides:
  enabled: true
  min_distance_km: 15  # Minimum distance to be considered a long ride
  search_radius_km: 5  # Radius to search for rides near clicked location
  default_target_duration_hours: 2.0  # Default target ride duration
  default_target_distance_km: 40  # Default target ride distance

output:
  report_directory: "output/reports"
  map_filename: "route_map.html"
  report_filename: "commute_analysis.html"

