<!DOCTYPE html>
<html>
<head>
    <title>Debug Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Modal styles */
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1040; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1050; max-width: 800px; width: 90%; max-height: 80vh; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; max-height: 60vh; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #6c757d; }
        .modal-close:hover { color: #000; }
        .activity-item { padding: 12px; border: 1px solid #dee2e6; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .activity-item:hover { background-color: #f8f9fa; }
        .uses-count { cursor: pointer; color: #667eea; text-decoration: underline; font-weight: 600; }
        .uses-count:hover { color: #764ba2; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Modal Debug Test</h1>
        <p>Click the "Uses" count below to test the modal:</p>
        
        <table class="table">
            <thead>
                <tr>
                    <th>Route</th>
                    <th>Uses</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Test Route</td>
                    <td>
                        <span class="uses-count"
                              onclick="showMatchedRoutes('test_route', 'Test Route', [{'distance': 16372.2, 'id': 15524233540, 'moving_time': 2100, 'start_date': '2025-08-20T12:15:35+00:00'}, {'distance': 16152.4, 'id': 14488148746, 'moving_time': 2021, 'start_date': '2025-05-15T12:12:33+00:00'}])"
                              title="Click to view matched activities">
                            2
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div id="console-output" style="margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 5px;">
            <strong>Console Output:</strong>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // Capture console.log
        const logDiv = document.getElementById('log');
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            logDiv.innerHTML += '<div>' + args.join(' ') + '</div>';
        };

        function showMatchedRoutes(routeId, routeName, routes) {
            console.log('📋 Showing matched routes for:', routeName);
            console.log('Routes data:', routes);
            
            // Create modal backdrop
            const backdrop = document.createElement('div');
            backdrop.className = 'modal-backdrop';
            backdrop.onclick = closeModal;
            
            // Create modal
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'matchedRoutesModal';
            
            // Build activity list HTML
            let activitiesHtml = '';
            if (routes && routes.length > 0) {
                routes.forEach(route => {
                    const date = new Date(route.start_date).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    const distance = route.distance ? (route.distance / 1000).toFixed(1) : '0.0';
                    const duration = route.moving_time ? formatDuration(route.moving_time) : '0:00';
                    
                    activitiesHtml += `
                        <div class="activity-item">
                            <div>
                                <strong>${date}</strong><br>
                                <small>${distance} km • ${duration}</small>
                            </div>
                            <a href="https://www.strava.com/activities/${route.id}" 
                               target="_blank" 
                               class="btn btn-sm btn-outline-primary">
                                View on Strava
                            </a>
                        </div>
                    `;
                });
            } else {
                activitiesHtml = '<p class="text-muted">No matched activities found.</p>';
            }
            
            modal.innerHTML = `
                <div class="modal-header">
                    <h5 class="modal-title">Matched Activities: ${routeName}</h5>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    ${activitiesHtml}
                </div>
            `;
            
            // Add to page
            document.body.appendChild(backdrop);
            document.body.appendChild(modal);
            
            console.log('✅ Modal displayed with', routes ? routes.length : 0, 'activities');
        }
        
        function closeModal() {
            console.log('Closing modal');
            const modal = document.getElementById('matchedRoutesModal');
            const backdrop = document.querySelector('.modal-backdrop');
            if (modal) modal.remove();
            if (backdrop) backdrop.remove();
        }
        
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            } else {
                return `${minutes}:${secs.toString().padStart(2, '0')}`;
            }
        }
        
        console.log('Script loaded, showMatchedRoutes available:', typeof showMatchedRoutes);
    </script>
</body>
</html>
