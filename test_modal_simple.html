<!DOCTYPE html>
<html>
<head>
    <title>Simple Modal Test</title>
    <style>
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; }
        .modal { position: relative; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 9999; max-width: 800px; width: 90%; max-height: 80vh; overflow: hidden; padding: 20px; }
        .uses-count { cursor: pointer; color: #667eea; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>
    <h1>Simple Modal Test</h1>
    <p>Click the number below:</p>
    
    <table>
        <tr class="route-row" onclick="console.log('Row clicked')">
            <td>Route Name</td>
            <td>
                <span class="uses-count" 
                      onclick="event.stopPropagation(); window.showMatchedRoutes('test', 'Test Route', [{id: 123, distance: 1000, moving_time: 600, start_date: '2025-01-01'}])">
                    1
                </span>
            </td>
        </tr>
    </table>
    
    <div id="log" style="margin-top: 20px; padding: 10px; background: #f4f4f4;"></div>
    
    <script>
        // Log to page
        const log = document.getElementById('log');
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            log.innerHTML += '<div>' + args.join(' ') + '</div>';
        };
        
        // Define functions
        function showMatchedRoutes(routeId, routeName, routes) {
            console.log('✅ showMatchedRoutes called!', routeName);
            
            const backdrop = document.createElement('div');
            backdrop.className = 'modal-backdrop';
            backdrop.onclick = closeModal;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <h2>Matched Activities: ${routeName}</h2>
                <p>Found ${routes.length} activities</p>
                <button onclick="closeModal()">Close</button>
            `;
            
            modal.onclick = function(e) {
                e.stopPropagation();
            };
            
            backdrop.appendChild(modal);
            document.body.appendChild(backdrop);
        }
        
        function closeModal() {
            console.log('Closing modal');
            const backdrop = document.querySelector('.modal-backdrop');
            if (backdrop) backdrop.remove();
        }
        
        // Expose globally
        window.showMatchedRoutes = showMatchedRoutes;
        window.closeModal = closeModal;
        
        console.log('Script loaded. showMatchedRoutes available:', typeof window.showMatchedRoutes);
    </script>
</body>
</html>
